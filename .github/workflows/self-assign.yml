name: Self Assign

on:
  issue_comment:
    types: [created]

permissions:
  issues: write

jobs:
  self-assign:
    if: ${{ !github.event.issue.pull_request }}
    runs-on: ubuntu-latest
    steps:
      - name: Handle /assign and /unassign commands
        uses: actions/github-script@v7
        with:
          script: |
            const comment = context.payload.comment.body.trim().toLowerCase();
            if (comment !== '/assign' && comment !== '/unassign') return;

            const issueNumber = context.payload.issue.number;
            const commenter = context.payload.comment.user.login;

            if (comment === '/assign') {
              const { data: issue } = await github.rest.issues.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
              });

              if (issue.assignees.length > 0) {
                const isAlreadyAssignee = issue.assignees.some(a => a.login === commenter);
                const message = isAlreadyAssignee
                  ? `@${commenter} you're already assigned to this issue!`
                  : `@${commenter} this issue is already assigned to ${issue.assignees.map(a => `@${a.login}`).join(', ')}. Please look for another open issue.`;
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  body: message,
                });
                return;
              }

              await github.rest.issues.addAssignees({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                assignees: [commenter],
              });

              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                labels: ['status: in-progress'],
              });

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: `👍 @${commenter} you've been assigned to this issue. Happy hacking — comment \`/unassign\` if you need to drop it later.`,
              });
            } else {
              await github.rest.issues.removeAssignees({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                assignees: [commenter],
              });

              const { data: issue } = await github.rest.issues.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
              });

              if (issue.assignees.length === 0) {
                try {
                  await github.rest.issues.removeLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issueNumber,
                    name: 'status: in-progress',
                  });
                } catch (e) {
                  // label wasn't present
                }
              }

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: `Got it, @${commenter} — you've been unassigned. This issue is open again for others.`,
              });
            }